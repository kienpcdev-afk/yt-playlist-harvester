<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đồng bộ Cookie YouTube</title>
  <style>
    * { box-sizing: border-box; }
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #fafafa;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 16px;
      font-weight: 600;
    }
    p.hint {
      margin: 0 0 14px;
      color: #555;
      line-height: 1.4;
      font-size: 13px;
    }
    button {
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #c00;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #a00; }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    #status {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.45;
      display: none;
    }
    #status.show { display: block; }
    #status.ok {
      background: #e8f5e9;
      color: #1b5e20;
      border: 1px solid #a5d6a7;
    }
    #status.err {
      background: #ffebee;
      color: #b71c1c;
      border: 1px solid #ef9a9a;
    }
    #status.info {
      background: #e3f2fd;
      color: #0d47a1;
      border: 1px solid #90caf9;
    }
  </style>
</head>
<body>
  <h1>Đồng bộ cookie YouTube</h1>
  <p class="hint">
    Mở tab YouTube đã đăng nhập, bật Tool trên máy (chạy <code>npm run start:win</code>), rồi nhấn nút bên dưới.
  </p>
  <button id="syncBtn" type="button">Cập nhật Cookie về Tool</button>
  <div id="status" role="status"></div>
  <script src="popup.js"></script>
</body>
</html>
